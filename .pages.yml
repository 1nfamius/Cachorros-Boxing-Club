media:
  input: assets/images/noticias
  output: /assets/images/noticias

content:
  - name: noticias
    label: Noticias y Eventos
    type: collection
    path: content/noticias
    filename: "{year}-{month}-{day}-{slug}.md"

    fields:
      - name: titulo
        label: Título
        type: string
        required: true

      - name: fecha
        label: Fecha
        type: date
        required: true

      - name: tipo
        label: Tipo
        type: select
        required: true
        options:
          values:
            - name: noticia
              label: Noticia
            - name: evento
              label: Evento
            - name: resultado
              label: Resultado
            - name: comunicado
              label: Comunicado
            - name: combate
              label: Combate
              
      - name: imagen
        label: Imagen destacada
        type: image

      - name: resumen
        label: Resumen corto
        type: text

      - name: body
        label: Contenido
        type: rich-text
        
      - name: peleador
        label: Nuestro peleador
        type: string
        
      - name: rival
        label: Rival
        type: string
        
      - name: lugar
        label: Lugar del combate
        type: string
        
      - name: hora_combate
        label: Hora del combate
        type: string
        description: "Formato HH:MM (ej: 20:00)"
        
      - name: fecha_combate
        label: Fecha del combate
        type: date
        description: "Si es distinta a la fecha de publicación"
        
      - name: cartelera
        label: Cartelera (imagen)
        type: image
