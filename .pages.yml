media:
  input: /assets/images/noticias
  output: /assets/images/noticias

content:
  - name: noticias
    label: Noticias y Eventos
    type: collection
    path: content/noticias
    filename: "{year}-{month}-{day}-{slug}.md"

    fields:
      - name: titulo
        label: Título
        type: string
        required: true

      - name: fecha
        label: Fecha
        type: date
        required: true

      - name: tipo
        label: Tipo
        type: select
        required: true
        options:
          values:
            - name: noticia
              label: Noticia
            - name: evento
              label: Evento
            - name: resultado
              label: Resultado
            - name: comunicado
              label: Comunicado
              
      - name: imagen
        label: Imagen destacada
        type: image

      - name: resumen
        label: Resumen corto
        type: text

      - name: body
        label: Contenido
        type: rich-text