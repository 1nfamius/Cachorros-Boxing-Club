media:
  input: assets/images/noticias
  output: /assets/images/noticias

content:
  items:
    - name: noticias
      label: Noticias y Eventos
      type: collection
      folder: content/noticias
      create: true

      fields:
        - name: titulo
          label: Título
          type: string
          required: true

        - name: fecha
          label: Fecha
          type: date
          required: true

        - name: tipo
          label: Tipo
          type: select
          required: true
          options:
            - label: Noticia
              value: noticia
            - label: Evento
              value: evento
            - label: Resultado
              value: resultado
            - label: Comunicado
              value: comunicado

        - name: imagen
          label: Imagen destacada
          type: image

        - name: resumen
          label: Resumen corto
          type: text

        - name: body
          label: Contenido
          type: rich-text