<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido confirmado – Iron Fist Boxing</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .success-page {
      max-width: 500px;
      margin: 4rem auto;
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      border: 1px solid #ddd;
    }
    .success-icon { font-size: 48px; margin-bottom: 1rem; }
    .success-page h2 { font-size: 22px; margin-bottom: 0.5rem; }
    .success-page p { color: #666; font-size: 14px; margin-bottom: 1.5rem; }
    .back-btn {
      display: inline-block;
      padding: 10px 24px;
      background: #D85A30;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    .back-btn:hover { background: #993C1D; }
  </style>
</head>
<body>
  <div class="success-page">
    <div class="success-icon">✅</div>
    <h2>¡Pedido confirmado!</h2>
    <p>Gracias por tu compra. Recibirás un email con la confirmación y la factura en breve.</p>
    <a href="/" class="back-btn">Volver a la tienda</a>
  </div>
</body>
</html>
